<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Track &amp; Control Me</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">Track &amp; Control Me</span>
    </div>
    <div class="topbar-meta" id="topbar-meta"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab" data-target="today" type="button">今日</button>
    <button class="tab" data-target="timeline" type="button">タイムライン</button>
    <button class="tab" data-target="kanban" type="button">カンバン</button>
    <button class="tab" data-target="reflection" type="button">振り返り</button>
    <button class="tab" data-target="goals" type="button">目標</button>
    <button class="tab" data-target="settings" type="button">設定</button>
  </nav>

  <!-- 拡張機能が最小要求版未満のときの警告帯（design D7-4・spec: extension-stable-group-id）。 -->
  <div id="ext-warning-banner" class="ext-warning-banner" hidden></div>

  <!-- お試し（デモ）モードの帯＋日付コントロール（demo.js が active 時のみ描画）。 -->
  <div id="demobar" class="demobar" hidden></div>

  <main class="content">
    <section id="screen-today" class="section"></section>
    <section id="screen-timeline" class="section"></section>
    <section id="screen-kanban" class="section"></section>
    <section id="screen-reflection" class="section"></section>
    <section id="screen-goals" class="section"></section>
    <section id="screen-settings" class="section"></section>
  </main>

  <div id="modal-root" class="modal-root"></div>

  <!-- 依存: Chart.js (vendored UMD, global `Chart`) を app モジュールより先に読み込む -->
  <script src="/js/chart.umd.min.js"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
