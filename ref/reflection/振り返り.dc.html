<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#eef1f6;}
  *{box-sizing:border-box;}
  .rf-editor:focus{outline:none;}
  .rf-editor::selection,.rf-editor *::selection{background:#dfe3ee;}
  a{color:#3b5bb5;text-decoration:none;}
  a:hover{color:#2c4593;}
  .rf-cal::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;}
  .rf-past-item:hover{background:#eef2f9 !important;border-color:#d8dfea !important;}
</style>
</helmet>
<div style="min-height:100vh;background:#eef1f6;font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;color:#22303f;">

  <!-- Header -->
  <header style="display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:#f6f8fc;border-bottom:1px solid #e4e9f1;">
    <div style="display:flex;align-items:center;gap:11px;">
      <span style="width:11px;height:11px;border-radius:50%;background:#3b5bb5;box-shadow:0 0 0 4px rgba(59,91,181,0.14);"></span>
      <span style="font-weight:700;font-size:17px;letter-spacing:0.01em;color:#22303f;">Track &amp; Control Me</span>
    </div>
    <div style="font-size:13px;color:#8b95a7;letter-spacing:0.02em;">作業日 2026-07-09 <span style="color:#c3cbd8;">·</span> tz Asia/Tokyo</div>
  </header>

  <!-- Tabs -->
  <nav style="display:flex;align-items:stretch;gap:4px;padding:0 40px;background:#f6f8fc;border-bottom:1px solid #e4e9f1;">
    <div style="padding:14px 8px;font-size:14.5px;color:#8b95a7;cursor:pointer;border-bottom:2px solid transparent;">今日</div>
    <div style="padding:14px 8px 14px 20px;font-size:14.5px;color:#8b95a7;cursor:pointer;border-bottom:2px solid transparent;">タイムライン</div>
    <div style="padding:14px 8px;font-size:14.5px;color:#8b95a7;cursor:pointer;border-bottom:2px solid transparent;">カンバン</div>
    <div style="padding:14px 8px;margin-left:12px;font-size:14.5px;font-weight:700;color:#3b5bb5;cursor:pointer;border-bottom:2px solid #3b5bb5;">振り返り</div>
    <div style="padding:14px 8px;margin-left:12px;font-size:14.5px;color:#8b95a7;cursor:pointer;border-bottom:2px solid transparent;">設定</div>
  </nav>

  <!-- Body -->
  <main style="max-width:1200px;margin:0 auto;padding:40px 40px 64px;display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:36px;align-items:start;">

    <!-- Left: writing -->
    <section style="min-width:0;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;">
        <div>
          <h1 style="font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-weight:700;font-size:30px;letter-spacing:0.01em;margin:0 0 6px;color:#22303f;">今日の振り返り</h1>

        </div>
      </div>

      <!-- Mood -->
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:22px;">
        <span style="font-size:13px;font-weight:500;color:#5a6678;white-space:nowrap;letter-spacing:0.02em;">今日の気分</span>
        <div style="display:inline-flex;gap:2px;padding:3px;background:#f1f4f9;border:1px solid #e4e9f1;border-radius:10px;">
          <sc-for list="{{ moodList }}" as="m" hint-placeholder-count="5">
            <span onClick="{{ m.click }}" style="cursor:pointer;font-size:13px;font-weight:{{ m.fw }};line-height:1;padding:7px 14px;border-radius:7px;white-space:nowrap;color:{{ m.color }};background:{{ m.bg }};transition:color .14s ease,background .14s ease;">{{ m.label }}</span>
          </sc-for>
        </div>
      </div>

      <!-- Editor card -->
      <div style="background:#ffffff;border:1px solid #e4e9f1;border-radius:14px;box-shadow:0 1px 2px rgba(30,45,70,0.05),0 10px 30px -18px rgba(30,45,70,0.22);overflow:hidden;">
        <div style="position:relative;">
          <div ref="{{ setPh }}" style="position:absolute;top:27px;left:34px;right:34px;pointer-events:none;font-size:15.5px;line-height:1.8;color:#a6afc0;">今日はどんな一日でしたか。Markdown で自由にどうぞ。</div>
          <div class="rf-editor" ref="{{ setEditor }}" contenteditable="true" spellcheck="false" style="min-height:360px;padding:25px 34px 30px;font-size:15.5px;line-height:1.8;color:#22303f;caret-color:#3b5bb5;"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px 14px 26px;border-top:1px solid #eef1f7;background:#f6f8fc;">
          <span style="font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:11.5px;color:#9aa4b4;letter-spacing:0.01em;"># 見出し&nbsp;&nbsp;·&nbsp;&nbsp;**太字**&nbsp;&nbsp;·&nbsp;&nbsp;- 箇条書き&nbsp;&nbsp;·&nbsp;&nbsp;&gt; 引用&nbsp;&nbsp;·&nbsp;&nbsp;`コード`</span>
          <div style="display:flex;align-items:center;gap:16px;">
            <span ref="{{ setCount }}" style="font-size:12.5px;color:#9aa4b4;white-space:nowrap;">0 文字</span>
            <sc-if value="{{ saved }}" hint-placeholder-val="{{ false }}">
              <span style="font-size:12.5px;color:#2e7d6b;white-space:nowrap;">保存しました</span>
            </sc-if>
            <button onClick="{{ save }}" style="font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-size:14px;font-weight:700;color:#ffffff;background:#3b5bb5;border:none;padding:9px 22px;border-radius:9px;cursor:pointer;letter-spacing:0.03em;transition:background .15s ease;" style-hover="background:#2c4593;">保存する</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Right rail -->
    <aside style="display:flex;flex-direction:column;gap:24px;">
      <div>
        <label style="display:block;font-size:12px;font-weight:700;letter-spacing:0.08em;color:#9aa4b4;text-transform:uppercase;margin-bottom:8px;">対象日</label>
        <input class="rf-cal" type="date" value="{{ selectedDate }}" onChange="{{ setDate }}" style="width:100%;font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-size:14.5px;color:#22303f;background:#f6f8fc;border:1px solid #e4e9f1;border-radius:10px;padding:11px 14px;cursor:pointer;">
      </div>

      <div>
        <h2 style="font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-size:16px;font-weight:600;color:#3d4a5c;margin:0 0 12px;padding-bottom:10px;border-bottom:1px solid #e4e9f1;">過去の振り返り</h2>
        <sc-if value="{{ hasPast }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;flex-direction:column;gap:9px;">
            <sc-for list="{{ past }}" as="p" hint-placeholder-count="3">
              <div class="rf-past-item" onClick="{{ p.open }}" style="background:#f6f8fc;border:1px solid #eef1f7;border-radius:11px;padding:13px 15px;cursor:pointer;transition:background .15s ease,border-color .15s ease;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
                  <span style="font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:12px;color:#8b95a7;letter-spacing:0.02em;">{{ p.date }}</span>
                  <span style="font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-size:12px;color:#8b95a7;">{{ p.mood }}</span>
                </div>
                <p style="margin:0;font-family:'IBM Plex Sans JP',system-ui,-apple-system,sans-serif;font-size:13.5px;line-height:1.55;color:#5a6678;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">{{ p.excerpt }}</p>
              </div>
            </sc-for>
          </div>
        </sc-if>
        <sc-if value="{{ noPast }}" hint-placeholder-val="{{ false }}">
          <p style="margin:18px 0;font-size:13px;color:#a6afc0;text-align:center;line-height:1.7;">保存済みの振り返りは<br>まだありません</p>
        </sc-if>
      </div>
    </aside>

  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    rating: 0,
    hover: 0,
    saved: false,
    selectedDate: '2026-07-09',
    past: [
      { id: 1, date: '2026-07-08', stars: 4, excerpt: '設計レビューで詰まっていた点が一気にほどけた。午後の集中がよく効いた一日。' },
      { id: 2, date: '2026-07-07', stars: 3, excerpt: '会議が多く自分の時間は取れず。ただ、チームの方向は少し揃った気がする。' },
      { id: 3, date: '2026-07-05', stars: 5, excerpt: '長く止まっていたリリースがようやく片付いた。夜、静かに達成感。' },
    ],
  };

  // ---- style tokens for generated markdown ----
  markerDim = '#b4bdcc';
  ink = '#22303f';
  muted = '#8b95a7';
  accentSoft = '#b9c6ea';
  codeBg = '#eef1f7';

  esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  mk(s){ return '<span style="color:'+this.markerDim+';font-weight:400;font-style:normal;">'+s+'</span>'; }

  inline(str){
    const codeStyle = "font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:.88em;background:"+this.codeBg+";padding:1px 6px;border-radius:5px;color:#5a6678;";
    let s = str;
    s = s.replace(/`([^`]+)`/g, (m,g)=> this.mk('`')+'<code style="'+codeStyle+'">'+g+'</code>'+this.mk('`'));
    s = s.replace(/\*\*([^*]+?)\*\*/g, (m,g)=> this.mk('**')+'<strong style="font-weight:800;color:#111a26;">'+g+'</strong>'+this.mk('**'));
    s = s.replace(/~~([^~]+?)~~/g, (m,g)=> this.mk('~~')+'<span style="text-decoration:line-through;color:#9aa4b4;">'+g+'</span>'+this.mk('~~'));
    s = s.replace(/(^|[^*])\*([^*\n]+?)\*/g, (m,pre,g)=> pre+this.mk('*')+'<em style="font-style:italic;">'+g+'</em>'+this.mk('*'));
    s = s.replace(/(^|[^_])_([^_\n]+?)_/g, (m,pre,g)=> pre+this.mk('_')+'<em style="font-style:italic;">'+g+'</em>'+this.mk('_'));
    return s;
  }

  fmtLine(line){
    const base = "margin:0;padding:2px 0;";
    if(line === '') return '<div style="'+base+'"><br></div>';

    let m;
    // heading
    if(m = line.match(/^(#{1,6})(\s+)(.*)$/)){
      const level = m[1].length;
      const sizes = {1:'29px',2:'24px',3:'20px',4:'17px',5:'16px',6:'15px'};
      const weight = level<=2 ? '700' : '600';
      const hs = "font-size:"+sizes[level]+";font-weight:"+weight+";line-height:1.45;color:"+this.ink+";letter-spacing:-.005em;padding-top:"+(level<=2?'10px':'4px')+";padding-bottom:2px;";
      return '<div style="'+base+hs+'">'+this.mk(this.esc(m[1]+m[2]))+this.inline(this.esc(m[3]))+'</div>';
    }
    // hr
    if(/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){
      return '<div style="'+base+'padding:12px 0;position:relative;"><span style="color:'+this.markerDim+';font-size:12px;letter-spacing:3px;">'+this.esc(line)+'</span><span style="position:absolute;left:0;right:0;top:50%;border-top:1px solid #e4e9f1;z-index:-0;pointer-events:none;"></span></div>';
    }
    // blockquote
    if(m = line.match(/^(&gt;|>)(\s?)(.*)$/) || (m = this.esc(line).match(/^(&gt;)(\s?)(.*)$/))){
      const raw = line.match(/^(>)(\s?)(.*)$/);
      if(raw){
        const q = "border-left:3px solid "+this.accentSoft+";padding-left:14px;color:"+this.muted+";font-style:italic;margin-left:2px;";
        return '<div style="'+base+q+'">'+this.mk(this.esc(raw[1]+raw[2]))+this.inline(this.esc(raw[3]))+'</div>';
      }
    }
    // list
    if(m = line.match(/^(\s*)([-*+]|\d+\.)(\s+)(.*)$/)){
      const indent = m[1].length;
      const pad = 4 + indent*20;
      return '<div style="'+base+'padding-left:'+pad+'px;">'+
        '<span style="color:#3b5bb5;font-weight:700;">'+this.esc(m[1]+m[2])+'</span>'+
        this.esc(m[3])+this.inline(this.esc(m[4]))+'</div>';
    }
    // paragraph
    return '<div style="'+base+'">'+this.inline(this.esc(line))+'</div>';
  }

  mdToBlocks(raw){
    return raw.split('\n').map(l=>this.fmtLine(l)).join('');
  }

  // ---- content + caret ----
  getContent(root){
    const blocks = [...root.children];
    if(!blocks.length) return root.textContent || '';
    return blocks.map(b=>b.textContent).join('\n');
  }

  getCaret(root){
    const sel = window.getSelection();
    if(!sel || !sel.rangeCount) return null;
    const r = sel.getRangeAt(0);
    let node = r.startContainer, off = r.startOffset;
    if(node === root){
      let acc = 0;
      for(let i=0;i<off && i<root.children.length;i++) acc += root.children[i].textContent.length + 1;
      return acc;
    }
    let block = node;
    while(block.parentNode && block.parentNode !== root) block = block.parentNode;
    const children = [...root.children];
    const bi = children.indexOf(block);
    if(bi < 0) return null;
    let acc = 0;
    for(let i=0;i<bi;i++) acc += children[i].textContent.length + 1;
    const range = document.createRange();
    range.selectNodeContents(block);
    try { range.setEnd(node, off); } catch(e){ return acc; }
    acc += range.toString().length;
    return acc;
  }

  setCaret(root, offset){
    const sel = window.getSelection();
    const children = [...root.children];
    let acc = 0;
    for(let bi=0; bi<children.length; bi++){
      const block = children[bi];
      const len = block.textContent.length;
      if(offset <= acc + len){
        this.placeIn(block, offset - acc, sel);
        return;
      }
      acc += len + 1;
    }
    const last = children[children.length-1];
    if(last) this.placeIn(last, last.textContent.length, sel);
  }

  placeIn(block, within, sel){
    const w = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, null);
    let t, acc = 0, last = null;
    while(t = w.nextNode()){
      last = t;
      if(acc + t.textContent.length >= within){
        const r = document.createRange();
        r.setStart(t, Math.max(0, within - acc));
        r.collapse(true);
        sel.removeAllRanges(); sel.addRange(r);
        return;
      }
      acc += t.textContent.length;
    }
    const r = document.createRange();
    if(last){ r.setStart(last, last.textContent.length); }
    else { r.setStart(block, 0); }
    r.collapse(true);
    sel.removeAllRanges(); sel.addRange(r);
  }

  render_(){
    const root = this.editor;
    if(!root) return;
    const caret = this.getCaret(root);
    const raw = this.getContent(root);
    const html = this.mdToBlocks(raw);
    if(root.innerHTML !== html){
      root.innerHTML = html;
      if(caret != null){ try { this.setCaret(root, caret); } catch(e){} }
    }
    this._raw = raw;
    this.updateChrome();
  }

  updateChrome(){
    const raw = this._raw || '';
    const empty = raw.trim() === '';
    if(this.ph) this.ph.style.display = empty ? 'block' : 'none';
    if(this.count) this.count.textContent = [...raw.replace(/\s/g,'')].length + ' 文字';
  }

  setEditor = (node) => {
    if(!node) return;
    this.editor = node;
    if(this._bound) return;
    this._bound = true;
    this._raw = '';
    node.innerHTML = '<div style="margin:0;padding:2px 0;"><br></div>';
    node.addEventListener('compositionstart', ()=>{ this._composing = true; });
    node.addEventListener('compositionend', ()=>{ this._composing = false; this.render_(); });
    node.addEventListener('input', ()=>{ if(this._composing) return; this.render_(); });
    this.updateChrome();
  };
  setPh = (n) => { if(n) this.ph = n; };
  setCount = (n) => { if(n) this.count = n; };

  setEditorRaw(raw){
    if(!this.editor) return;
    this.editor.innerHTML = this.mdToBlocks(raw);
    this._raw = raw;
    this.updateChrome();
  }

  setRating = (i) => this.setState({ rating: this.state.rating === i ? 0 : i });
  setHover = (i) => this.setState({ hover: i });
  clearHover = () => this.setState({ hover: 0 });
  setDate = (e) => this.setState({ selectedDate: e.target.value });

  save = () => {
    const raw = (this._raw || '').trim();
    if(!raw){ return; }
    const excerpt = raw.replace(/[#>*_`~-]/g,'').replace(/\s+/g,' ').trim().slice(0,80);
    const entry = { id: Date.now(), date: this.state.selectedDate, stars: this.state.rating, excerpt: excerpt || '(本文なし)' };
    this.setState({ past: [entry, ...this.state.past], saved: true });
    clearTimeout(this._st);
    this._st = setTimeout(()=> this.setState({ saved: false }), 2200);
  };

  openPast = (p) => {
    this.setEditorRaw(p.excerpt);
    this.setState({ rating: p.stars, selectedDate: p.date });
  };

  renderVals(){
    const moodLabels = ['いまひとつ','まあまあ','ふつう','良い','とても良い'];
    const moodList = moodLabels.map((label, idx) => {
      const val = idx + 1;
      const sel = this.state.rating === val;
      return {
        label,
        fw: sel ? '600' : '400',
        color: sel ? '#ffffff' : '#8b95a7',
        bg: sel ? '#3b5bb5' : 'transparent',
        click: () => this.setRating(val),
      };
    });
    const past = this.state.past.map(p => ({
      date: p.date,
      mood: moodLabels[p.stars - 1] || '',
      excerpt: p.excerpt,
      open: () => this.openPast(p),
    }));
    const d = new Date(this.state.selectedDate + 'T00:00:00');
    const wd = ['日','月','火','水','木','金','土'][d.getDay()] || '';
    const longDate = isNaN(d) ? this.state.selectedDate : (d.getFullYear()+'年 '+(d.getMonth()+1)+'月 '+d.getDate()+'日 ('+wd+')');
    return {
      moodList,
      saved: this.state.saved,
      selectedDate: this.state.selectedDate,
      setDate: this.setDate,
      clearHover: this.clearHover,
      save: this.save,
      past,
      hasPast: past.length > 0,
      noPast: past.length === 0,
      longDate,
      setEditor: this.setEditor,
      setPh: this.setPh,
      setCount: this.setCount,
    };
  }
}
</script>
</body>
</html>
